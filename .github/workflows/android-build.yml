name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: gradle

      - name: Configure Android SDK
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          if [ ! -d "$SDK_ROOT" ]; then
            SDK_ROOT="/usr/local/lib/android/sdk"
          fi
          if [ ! -d "$SDK_ROOT" ]; then
            echo "Android SDK directory not found."
            exit 1
          fi

          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

          SDKMANAGER="$(find "$SDK_ROOT" -type f -name sdkmanager | head -n 1)"
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager binary not found in $SDK_ROOT"
            exit 1
          fi

          chmod +x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" --install "platform-tools" "platforms;android-29" "build-tools;29.0.3"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
